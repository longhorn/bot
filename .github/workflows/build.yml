name: build
on:
  push:
    branches:
    - master
  pull_request:
jobs:
  build-github-bot-image:
    name: Build github-bot image
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    # longhornio/github-bot image
    - name: docker-dry-run
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
      with:
        context: github-bot
        push: false
        platforms: linux/amd64
        tags: longhornio/github-bot:master
        file: github-bot/Dockerfile
        build-args: |
          ARCH=amd64

    - name: Login to Docker Hub
      if: ${{ startsWith(github.ref, 'refs/heads/') }}
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: docker-publish
      if: ${{ startsWith(github.ref, 'refs/heads/') }}
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
      with:
        context: github-bot
        push: true
        platforms: linux/amd64
        tags: longhornio/github-bot:master
        file: github-bot/Dockerfile
        build-args: |
          ARCH=amd64

  deploy-longhorn-bot-images:
    name: Deploy Longhorn bot images
    if: ${{ startsWith(github.ref, 'refs/heads/') }}
    runs-on: ubuntu-latest
    needs:
    - build-github-bot-image
    steps:
    - name: Rollout restart github-bot
      uses: actions-hub/kubectl@571dee19fcd8ac679a54185817c0c55931b56fa2 # v1.30.0
      env:
        KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      with:
        args: rollout restart deployment -n github-bot github-bot
